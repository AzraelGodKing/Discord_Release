# Installs dependencies and commits node_modules. Runs on push (when action files change) or manually.
name: Prepare action
on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'index.js'
      - 'action.yml'
  workflow_dispatch:
jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Commit node_modules
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f node_modules package-lock.json
          git diff --staged --quiet || (git commit -m "chore: add node_modules for action" && git push)
